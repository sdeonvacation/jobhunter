services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: jobhunter
      POSTGRES_USER: jobhunter
      POSTGRES_PASSWORD: jobhunter
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobhunter -d jobhunter"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./api
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: jobhunter
      DB_PASSWORD: jobhunter
      AI_API_KEY: ${AI_API_KEY:-}
      AI_PROVIDER: ${AI_PROVIDER:-anthropic}
    volumes:
      - ./profile.yaml:/app/profile.yaml:ro
      - ./keywords.yaml:/app/keywords.yaml:ro
    depends_on:
      db:
        condition: service_healthy

  dashboard:
    build: ./dashboard
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  pgdata:
