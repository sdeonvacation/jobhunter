spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5435}/jobhunter
    username: ${DB_USER:jobhunter}
    password: ${DB_PASSWORD:jobhunter}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  quartz:
    job-store-type: memory
  liquibase:
    change-log: classpath:db/changelog/master.xml

ai:
  provider: ${JOBHUNTER_AI_PROVIDER:anthropic}
  api-key: ${JOBHUNTER_AI_API_KEY:}
  base-url: ${JOBHUNTER_AI_BASE_URL:}
  extraction-model: ${JOBHUNTER_AI_EXTRACTION_MODEL:claude-haiku-4-5}
  tailoring-model: ${JOBHUNTER_AI_TAILORING_MODEL:claude-sonnet-4-5}

ai-crawl:
  schedule: "0 0 15 * * ?"
  frequency-hours: 24
  batch-size: 150
  max-content-chars: 8000
  enabled: ${AI_CRAWL_ENABLED:true}

pipeline:
  schedule: "0 0 */4 * * ?"
  timeout-seconds: 30

discovery:
  schedule: "0 0 */6 * * ?"
  providers:
    jobspy:
      enabled: true
      keywords: ["backend engineer", "Java developer", "Spring Boot", "Kotlin"]
      locations: ["Germany", "Netherlands", "remote"]
    stepstone:
      enabled: true
      postal-codes: ["10115", "80331", "20095", "60311", "50667"]
    linkedin-alerts:
      enabled: false
    linkedin:
      enabled: ${LINKEDIN_MCP_ENABLED:true}
      keywords: ["backend engineer", "Java developer", "Spring Boot", "Kotlin"]
      locations: ["Germany", "Netherlands", "remote"]

linkedin-mcp:
  enabled: ${LINKEDIN_MCP_ENABLED:true}
  base-url: ${LINKEDIN_MCP_URL:http://127.0.0.1:8000}
  path: /mcp
  timeout-seconds: 30
  rate-limit:
    search-per-hour: 20
    profile-per-hour: 15
    action-per-hour: 10
    total-per-hour: 50
  circuit-breaker:
    failure-threshold: 3
    cooldown-minutes: 60
  enrichment:
    enabled: true
    batch-size: 10
    delay-between-ms: 3000

resolution:
  google-search:
    api-key: ${GOOGLE_SEARCH_API_KEY:}
    cx: ${GOOGLE_SEARCH_CX:}
  strategies-order: [PATTERN_MATCH, GOOGLE_SEARCH, REDIRECT_FOLLOW]
  timeout-seconds: 15

scoring:
  schedule: "0 30 7,13,19 * * ?"
  opportunity-weights:
    match-score: 0.30
    interview-history: 0.20
    salary: 0.20
    company-quality: 0.15
    seniority: 0.10
    location-fit: 0.05

digest:
  schedule: "0 30 7 * * ?"

gdpr:
  recruiter-ttl-days: 90
  purge-schedule: "0 0 2 * * ?"

# visa-reaper:
#   schedule: "0 0 */6 * * ?"  # default: every 6h

aggregator:
  enrichment:
    enabled: true
    batch-size: 5
    delay-between-ms: 2000
    min-description-length: 500
  sources:
    - name: berlinstartupjobs
      strategy: ai
      job-source: BERLIN_STARTUP_JOBS
      discovery-source: BERLIN_STARTUP_JOBS
      url: "https://berlinstartupjobs.com/engineering/"
      frequency-hours: 12
      max-results: 30
    - name: arbeitnow
      strategy: rest-api
      job-source: ARBEITNOW
      discovery-source: ARBEITNOW
      url: "https://www.arbeitnow.com/api/job-board-api"
      frequency-hours: 6
      max-results: 50
    - name: careersingothenburg
      strategy: meilisearch
      job-source: CAREERS_IN_GOTHENBURG
      discovery-source: CAREERS_IN_GOTHENBURG
      url: "https://search.movetogbg.tenfifty.io"
      frequency-hours: 12
      max-results: 200
      visa-exempt: true
      config:
        apiKey: "d0f1115ce0f71a8d890b7733f4e3e15c8e03682666eb72e320efb61a46cfda4c"
        index: "jobs"
        filter: "language = \"en\""
    - name: instaffo
      strategy: instaffo
      job-source: INSTAFFO
      discovery-source: INSTAFFO
      url: "https://jobs.instaffo.com/sitemap-jobs.xml"
      frequency-hours: 8
      max-results: 50
      visa-exempt: true
      config:
        delayBetweenMs: "400"
        maxScrapePerRun: "50"

server:
  port: 8080

logging:
  level:
    dev.jobhunter: DEBUG
    org.springframework.web.reactive: INFO
