spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5435}/jobhunter
    username: ${DB_USER:jobhunter}
    password: ${DB_PASSWORD:jobhunter}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  quartz:
    job-store-type: memory
  liquibase:
    change-log: classpath:db/changelog/master.xml

ai:
  provider: ${JOBHUNTER_AI_PROVIDER:anthropic}
  api-key: ${JOBHUNTER_AI_API_KEY:}
  base-url: ${JOBHUNTER_AI_BASE_URL:}
  extraction-model: ${JOBHUNTER_AI_EXTRACTION_MODEL:claude-haiku-4-5}
  tailoring-model: ${JOBHUNTER_AI_TAILORING_MODEL:claude-sonnet-4-5}

ai-crawl:
  schedule: "0 0 3 * * ?"
  frequency-hours: 24
  batch-size: 5
  max-content-chars: 8000
  enabled: ${AI_CRAWL_ENABLED:true}

crawl:
  default-frequency-hours: 12
  high-priority-frequency-hours: 6
  timeout-seconds: 30

discovery:
  schedule: "0 0 6 * * ?"
  providers:
    jobspy:
      enabled: true
      keywords: ["backend engineer", "Java developer", "Spring Boot", "Kotlin"]
      locations: ["Germany", "Netherlands", "remote"]
    stepstone:
      enabled: true
      postal-codes: ["10115", "80331", "20095", "60311", "50667"]
    linkedin-alerts:
      enabled: false
    linkedin:
      enabled: ${LINKEDIN_MCP_ENABLED:true}
      keywords: ["backend engineer", "Java developer", "Spring Boot", "Kotlin"]
      locations: ["Germany", "Netherlands", "remote"]

linkedin-mcp:
  enabled: ${LINKEDIN_MCP_ENABLED:true}
  base-url: ${LINKEDIN_MCP_URL:http://localhost:8000}
  path: /mcp
  timeout-seconds: 30
  rate-limit:
    search-per-hour: 20
    profile-per-hour: 15
    action-per-hour: 10
    total-per-hour: 50
  circuit-breaker:
    failure-threshold: 3
    cooldown-minutes: 60
  enrichment:
    enabled: true
    batch-size: 10
    delay-between-ms: 3000

resolution:
  google-search:
    api-key: ${GOOGLE_SEARCH_API_KEY:}
    cx: ${GOOGLE_SEARCH_CX:}
  strategies-order: [PATTERN_MATCH, GOOGLE_SEARCH, REDIRECT_FOLLOW]
  timeout-seconds: 15

scoring:
  schedule: "0 0 7 * * ?"
  opportunity-weights:
    match-score: 0.30
    interview-history: 0.20
    salary: 0.20
    company-quality: 0.15
    seniority: 0.10
    location-fit: 0.05

digest:
  schedule: "0 30 7 * * ?"

gdpr:
  recruiter-ttl-days: 90
  purge-schedule: "0 0 2 * * ?"

server:
  port: 8080

logging:
  level:
    dev.jobhunter: DEBUG
    org.springframework.web.reactive: INFO
