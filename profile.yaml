      - "german\\s+c[12]"
      - "deutsch\\s+c[12]"
      - "flie[ßs]end\\s+deutsch"
      - "fluent\\s+german"
      - "muttersprache"
      - "native\\s+german"
      - "german\\s+native"
      - "verhandlungssicher"
      # Dutch
      - "dutch\\s+c[12]"
      - "\\bnederlands\\b"
      - "vloeiend\\s+nederlands"
      - "moedertaal"
      # Spanish
      - "spanish\\s+c[12]"
      - "\\bespa[ñn]ol\\b"
      - "castellano"
      - "fluidez.*espa[ñn]ol"
      # Swedish
      - "swedish\\s+c[12]"
      - "\\bsvenska\\b"
      - "flytande\\s+svenska"
      # French
      - "french\\s+c[12]"
      - "\\bfran[çc]ais\\b"
      - "courant.*fran[çc]ais"
      - "langue\\s+maternelle"
  yoe:
